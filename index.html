<!DOCTYPE html>
<html>
<head>
  <title>Smart QR Attendance System</title>

  <!-- QR + Scanner Libraries -->
  <script src="https://unpkg.com/html5-qrcode"></script>
  <script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>

  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      text-align: center;
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white;
      margin: 0;
      padding: 20px;
    }

    h1 {
      margin-bottom: 10px;
    }

    .container {
      background: white;
      color: black;
      padding: 20px;
      border-radius: 15px;
      max-width: 400px;
      margin: auto;
      box-shadow: 0 10px 25px rgba(0,0,0,0.3);
    }

    button {
      background: #667eea;
      color: white;
      border: none;
      padding: 10px 20px;
      font-size: 16px;
      border-radius: 8px;
      cursor: pointer;
      margin: 10px;
    }

    button:hover {
      background: #5a67d8;
    }

    #qr {
      margin: 20px;
    }

    #reader {
      width: 300px;
      margin: auto;
    }

    #result {
      font-size: 18px;
      margin-top: 10px;
      font-weight: bold;
    }

    #clock {
      margin-bottom: 10px;
      font-size: 14px;
    }

    #records {
      margin-top: 15px;
      text-align: left;
      max-height: 200px;
      overflow-y: auto;
      font-size: 14px;
    }

    footer {
      margin-top: 20px;
      font-size: 12px;
    }
  </style>
</head>

<body>

<h1>📚 Smart QR Attendance System</h1>
<div id="clock"></div>

<div class="container">

  <button onclick="startQR()">Start Attendance</button>

  <div id="qr"></div>

  <h3>Scan QR</h3>
  <div id="reader"></div>

  <div id="result"></div>

  <div id="records"></div>

</div>

<footer>Developed by Anurag Gautam 🚀</footer>

<script>
let interval;

// Start QR system
function startQR() {
  generateQR();

  clearInterval(interval);
  interval = setInterval(() => {
    generateQR();
  }, 10000); // every 10 sec
}

// Generate QR
function generateQR() {
  let data = "ATTENDANCE_" + new Date().getTime();

  document.getElementById("qr").innerHTML = "";

  QRCode.toCanvas(data, { width: 200 }, function (err, canvas) {
    document.getElementById("qr").appendChild(canvas);
  });
}

// Scan success
function onScanSuccess(decodedText) {
  if (decodedText.startsWith("ATTENDANCE_")) {

    let records = JSON.parse(localStorage.getItem("attendance")) || [];

    let newEntry = {
      time: new Date().toLocaleString(),
      status: "Present"
    };

    records.push(newEntry);

    localStorage.setItem("attendance", JSON.stringify(records));

    document.getElementById("result").innerHTML =
      "✅ Attendance Saved Successfully!";

    displayAttendance();

  } else {
    document.getElementById("result").innerHTML = "❌ Invalid QR";
  }
}

// Display records
function displayAttendance() {
  let records = JSON.parse(localStorage.getItem("attendance")) || [];

  let output = "<h3>Attendance Records</h3>";

  records.forEach((rec, index) => {
    output += `<p>${index + 1}. ${rec.time} - ${rec.status}</p>`;
  });

  document.getElementById("records").innerHTML = output;
}

// Initialize scanner
let scanner = new Html5QrcodeScanner("reader", {
  fps: 10,
  qrbox: 250
});
scanner.render(onScanSuccess);

// Load records on start
displayAttendance();

// Live clock
setInterval(() => {
  document.getElementById("clock").innerText =
    "Time: " + new Date().toLocaleTimeString();
}, 1000);
</script>

</body>
</html>
